<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Exclusive Album (mockup)</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{

min-height:100svh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

box-sizing:border-box;

}

.player{

width:90%;
max-width:420px;

max-height:85svh;

overflow-y:auto;

padding:25px;

border-radius:25px;

background:rgba(0,0,0,.35);

backdrop-filter:blur(15px);

box-shadow:
0 0 40px rgba(255,220,180,.15);

}

.cover{

display:block;

width:50%;

margin:auto;

margin-bottom:15px;

border-radius:15px;

box-shadow:
0 0 25px rgba(255,220,180,.25);

}

.trackTitle{

font-size:22px;
font-weight:bold;

text-align:center;

margin-bottom:5px;

}

.artist{

text-align:center;

opacity:.7;

margin-bottom:15px;

}


.progress{

width:100%;

appearance:none;

background:transparent;

}


.progress::-webkit-slider-runnable-track{

height:6px;

border-radius:10px;

background:
rgba(255,220,150,.25);

}


.progress::-webkit-slider-thumb{

-webkit-appearance:none;

width:18px;
height:18px;

margin-top:-6px;

border-radius:50%;

background:
rgb(255,220,150);

box-shadow:
0 0 10px rgba(255,220,150,.8);

}

.progress::-moz-range-thumb{

width:18px;
height:18px;

border:none;

border-radius:50%;

background:
rgb(255,220,150);

}


.time{

display:flex;

justify-content:space-between;

font-size:12px;

margin-top:5px;

opacity:.8;

}

.controls{

display:flex;

justify-content:center;

gap:10px;

margin-top:15px;

flex-wrap:wrap;

}

button{

padding:10px 14px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:18px;

background:
rgba(255,255,255,.15);

color:white;

}

.activeButton{

background:
rgba(255,220,150,.5);

}

.playlist{

margin-top:20px;

max-height:220px;

overflow-y:auto;

}

.song{

display:flex;

align-items:center;

padding:10px;

border-radius:10px;

margin-bottom:4px;

}

.song:hover{

background:
rgba(255,255,255,.1);

}

.activeSong{

background:
rgba(255,220,150,.25);

}

.check{

cursor:pointer;

margin-right:10px;

font-size:18px;

}

.songTitle{

cursor:pointer;

}

</style>

<script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6"></script>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="player">

<img
src="cover.png"
class="cover">

<div
class="trackTitle"
id="title">

Loading...

</div>

<div class="artist">

Exclusive Album (Mock-up)

</div>

<input
class="progress"
id="progress"
type="range"
value="0"
min="0"
max="100">

<div class="time">

<span id="current">
0:00
</span>

<span id="duration">
0:00
</span>

</div>


<div class="controls">

<button id="prev">⏮</button>

<button id="play">▶</button>

<button id="next">⏭</button>

<button id="repeat">↩</button>

<button id="shuffle">🔀</button>
<button id="timerBtn">⏱</button>
<span id="timerDisplay" style="font-size:12px;opacity:.8;"></span>

</div>


<div
class="playlist"
id="playlist">

</div>

</div>

</div>



<div id="timerModal" style="display:none;position:fixed;bottom:0;left:0;width:100%;background:rgba(20,20,20,.95);padding:20px;border-radius:20px 20px 0 0;z-index:10;color:white">
<div><b>Fade-out timer</b></div>
<div style="margin-top:10px">
<button onclick="startTimer(15)">15m</button>
<button onclick="startTimer(30)">30m</button>
<button onclick="startTimer(45)">45m</button>
<button onclick="startTimer(60)">60m</button>
</div>
<div style="margin-top:10px">
Hours <input id="th" type="number" min="0" value="0" style="width:50px">
Minutes <input id="tm" type="number" min="0" value="30" style="width:50px">
<button onclick="startCustomTimer()">Start</button>
<button onclick="closeTimer()">Close</button>
</div>
</div>

<audio id="audio"></audio>


<script>

const tracks=[

{
title:"Sweet Jane",
file:"sweetjane.mp3",
enabled:true
},

{
title:"Ocean",
file:"ocean.mp3",
enabled:true
},

{
title:"Morricone",
file:"morricone.mp3",
enabled:true
}

];


let currentTrack=0;

let repeatMode=0;

let shuffle=false;


const audio=
document.getElementById("audio");

const title=
document.getElementById("title");

const playBtn=
document.getElementById("play");

const progress=
document.getElementById("progress");

const current=
document.getElementById("current");

const duration=
document.getElementById("duration");

const repeatBtn=
document.getElementById("repeat");

const shuffleBtn=
document.getElementById("shuffle");



function getEnabledTracks(){

return tracks
.map((t,i)=>t.enabled?i:null)
.filter(i=>i!==null);

}


function loadTrack(i){

currentTrack=i;

audio.src=
tracks[i].file;

title.innerText=
tracks[i].title;

audio.load();

renderPlaylist();

}


function playTrack(i){

loadTrack(i);

audio.play();

playBtn.innerText="⏸";

}


function renderPlaylist(){

let html="";

tracks.forEach((t,i)=>{

html+=`

<div class="
song
${i===currentTrack?"activeSong":""}
">

<span
class="check"
onclick="toggleTrack(${i})">

${t.enabled?"☑":"☐"}

</span>

<span
class="songTitle"
onclick="playTrack(${i})">

${i+1}. ${t.title}

</span>

</div>

`;

});

playlist.innerHTML=
html;

}


function toggleTrack(i){

tracks[i].enabled=
!tracks[i].enabled;

renderPlaylist();

}



loadTrack(0);



playBtn.onclick=()=>{

if(audio.paused){

audio.play();

playBtn.innerText="⏸";

}
else{

audio.pause();

playBtn.innerText="▶";

}

};



repeatBtn.onclick=()=>{

repeatMode++;

if(repeatMode>2)
repeatMode=0;

repeatBtn.innerText=
["↩","🔁","🔂"]
[repeatMode];

};



shuffleBtn.onclick=()=>{

shuffle=!shuffle;

shuffleBtn.classList.toggle(
"activeButton"
);

};



function nextTrack(){

let enabled=
getEnabledTracks();

if(enabled.length===0)
return;

if(repeatMode===2){

audio.currentTime=0;
audio.play();

return;

}

if(shuffle){

currentTrack=

enabled[
Math.floor(
Math.random()
*
enabled.length
)];

}
else{

let pos=
enabled.indexOf(
currentTrack
);

pos++;

if(pos>=enabled.length){

if(repeatMode===1){

pos=0;

}
else{

audio.pause();

playBtn.innerText="▶";

return;

}

}

currentTrack=
enabled[pos];

}

playTrack(currentTrack);

}



document
.getElementById("next")
.onclick=nextTrack;



document
.getElementById("prev")
.onclick=()=>{

let enabled=
getEnabledTracks();

let pos=
enabled.indexOf(
currentTrack
);

pos--;

if(pos<0)
pos=
enabled.length-1;

playTrack(
enabled[pos]
);

};


audio.addEventListener(
"ended",
nextTrack
);


audio.addEventListener(
"timeupdate",
()=>{

progress.value=
(audio.currentTime/audio.duration)
*100||0;

current.innerText=
format(
audio.currentTime
);

duration.innerText=
format(
audio.duration
);

});


progress.oninput=()=>{

audio.currentTime=
(progress.value/100)
*
audio.duration;

};


function format(sec){

if(!sec)
return "0:00";

let m=
Math.floor(sec/60);

let s=
Math.floor(sec%60);

if(s<10)
s="0"+s;

return m+":"+s;

}



// BACKGROUND

const c=document.getElementById("bg");
const ctx=c.getContext("2d");
let cells=[];

function resize(){
 c.width=window.innerWidth;
 c.height=window.innerHeight;
 generateMosaic();
}
window.addEventListener("resize",resize);

function generateMosaic(){
 cells=[];
 const count=100;
 const points=[];

 for(let i=0;i<count;i++){
   points.push([Math.random()*c.width,Math.random()*c.height]);
 }

 const delaunay=d3.Delaunay.from(points);
 const voronoi=delaunay.voronoi([0,0,c.width,c.height]);

 const palette=[
   [122,92,58],
   [154,122,78],
   [186,154,108],
   [220,204,170],
   [198,172,128]
 ];

 for(let i=0;i<count;i++){
   const poly=voronoi.cellPolygon(i);
   if(!poly) continue;

   cells.push({
     poly,
     color:palette[Math.floor(Math.random()*palette.length)],
     phase:Math.random()*Math.PI*2
   });
 }
}

function drawCell(cell,time){

 let cx=0,cy=0;
 for(const p of cell.poly){cx+=p[0];cy+=p[1];}
 cx/=cell.poly.length;
 cy/=cell.poly.length;

 const shimmer=0.97+0.03*Math.sin(time*0.0000012+cell.phase);

 const r=Math.min(255,cell.color[0]*shimmer);
 const g=Math.min(255,cell.color[1]*shimmer);
 const b=Math.min(255,cell.color[2]*shimmer);

 ctx.beginPath();

 for(let i=0;i<cell.poly.length;i++){
   const p0=cell.poly[i];
   const p1=cell.poly[(i+1)%cell.poly.length];
   const mx=(p0[0]+p1[0])/2;
   const my=(p0[1]+p1[1])/2;

   const sharp=((i+Math.floor(cell.phase*100))%5===0);

   if(i===0) ctx.moveTo(mx,my);
   else if(sharp) ctx.lineTo(mx,my);
   else ctx.quadraticCurveTo(p0[0],p0[1],mx,my);
 }

 ctx.closePath();

 const grad=ctx.createRadialGradient(cx,cy,4,cx,cy,140);
 grad.addColorStop(0,`rgba(${Math.min(255,r+10)},${Math.min(255,g+10)},${Math.min(255,b+10)},0.34)`);
 grad.addColorStop(1,`rgba(${r},${g},${b},0.24)`);

 ctx.fillStyle=grad;
 ctx.fill();

 ctx.save();
 ctx.shadowBlur=3;
 ctx.shadowColor="rgba(210,225,240,0.20)";
 ctx.strokeStyle="rgba(190,205,225,0.62)";
 ctx.lineWidth=1.8;
 ctx.stroke();
 ctx.restore();
}

function animate(){

 const bg=ctx.createLinearGradient(0,0,0,c.height);
 bg.addColorStop(0,"rgb(78,92,108)");
 bg.addColorStop(1,"rgb(58,70,84)");

 ctx.fillStyle=bg;
 ctx.fillRect(0,0,c.width,c.height);

 const now=performance.now();

 for(const cell of cells){
   drawCell(cell,now);
 }

 requestAnimationFrame(animate);
}

resize();
animate();


// TIMER
let timerSeconds=0;
let timerInterval=null;
const timerBtn=document.getElementById("timerBtn");
const timerDisplay=document.getElementById("timerDisplay");
const timerModal=document.getElementById("timerModal");

timerBtn.onclick=()=>{timerModal.style.display="block";}

function closeTimer(){timerModal.style.display="none";}

function startCustomTimer(){
let h=parseInt(document.getElementById("th").value)||0;
let m=parseInt(document.getElementById("tm").value)||0;
startTimer(h*60+m);
}

function startTimer(minutes){
closeTimer();
timerSeconds=minutes*60;
localStorage.setItem("sleepTimerEnd",Date.now()+timerSeconds*1000);

if(timerInterval) clearInterval(timerInterval);

timerInterval=setInterval(updateTimer,1000);
updateTimer();
}

function updateTimer(){
let end=localStorage.getItem("sleepTimerEnd");
if(!end)return;

timerSeconds=Math.floor((end-Date.now())/1000);

if(timerSeconds<=0){
clearInterval(timerInterval);
audio.pause();
audio.volume=1;
timerDisplay.innerText="";
localStorage.removeItem("sleepTimerEnd");
title.innerText="Listening session ended";
return;
}

if(timerSeconds<=15){
audio.volume=Math.max(0,timerSeconds/15);
}

let h=Math.floor(timerSeconds/3600);
let m=Math.floor((timerSeconds%3600)/60);

timerDisplay.innerText=
"⏱ "+(h>0?h+"h ":"")+m+"m";
}

window.addEventListener("load",()=>{
let end=localStorage.getItem("sleepTimerEnd");
if(end){
timerInterval=setInterval(updateTimer,1000);
updateTimer();
}
});


</script>

</body>
</html>
