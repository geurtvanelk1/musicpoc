<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Exclusive Album (mockup)</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{

min-height:100svh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

box-sizing:border-box;

}

.player{

width:90%;
max-width:420px;

max-height:85svh;

overflow-y:auto;

padding:25px;

border-radius:25px;

background:rgba(0,0,0,.35);

backdrop-filter:blur(15px);

box-shadow:
0 0 40px rgba(255,220,180,.15);

}

.cover{

display:block;

width:50%;

margin:auto;

margin-bottom:15px;

border-radius:15px;

box-shadow:
0 0 25px rgba(255,220,180,.25);

}

.trackTitle{

font-size:22px;
font-weight:bold;

text-align:center;

margin-bottom:5px;

}

.artist{

text-align:center;

opacity:.7;

margin-bottom:15px;

}


.progress{

width:100%;

appearance:none;

background:transparent;

}


.progress::-webkit-slider-runnable-track{

height:6px;

border-radius:10px;

background:
rgba(255,220,150,.25);

}


.progress::-webkit-slider-thumb{

-webkit-appearance:none;

width:18px;
height:18px;

margin-top:-6px;

border-radius:50%;

background:
rgb(255,220,150);

box-shadow:
0 0 10px rgba(255,220,150,.8);

}

.progress::-moz-range-thumb{

width:18px;
height:18px;

border:none;

border-radius:50%;

background:
rgb(255,220,150);

}


.time{

display:flex;

justify-content:space-between;

font-size:12px;

margin-top:5px;

opacity:.8;

}

.controls{

display:flex;

justify-content:center;

gap:10px;

margin-top:15px;

flex-wrap:wrap;

}

button{

padding:10px 14px;

border:none;

border-radius:12px;

cursor:pointer;

font-size:18px;

background:
rgba(255,255,255,.15);

color:white;

}

.activeButton{

background:
rgba(255,220,150,.5);

}

.playlist{

margin-top:20px;

max-height:220px;

overflow-y:auto;

}

.song{

display:flex;

align-items:center;

padding:10px;

border-radius:10px;

margin-bottom:4px;

}

.song:hover{

background:
rgba(255,255,255,.1);

}

.activeSong{

background:
rgba(255,220,150,.25);

}

.check{

cursor:pointer;

margin-right:10px;

font-size:18px;

}

.songTitle{

cursor:pointer;

}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="player">

<img
src="cover.png"
class="cover">

<div
class="trackTitle"
id="title">

Loading...

</div>

<div class="artist">

Exclusive Album (Mock-up)

</div>

<input
class="progress"
id="progress"
type="range"
value="0"
min="0"
max="100">

<div class="time">

<span id="current">
0:00
</span>

<span id="duration">
0:00
</span>

</div>


<div class="controls">

<button id="prev">⏮</button>

<button id="play">▶</button>

<button id="next">⏭</button>

<button id="repeat">↩</button>

<button id="shuffle">🔀</button>
<button id="timerBtn">⏱</button>
<span id="timerDisplay" style="font-size:12px;opacity:.8;"></span>

</div>


<div
class="playlist"
id="playlist">

</div>

</div>

</div>



<div id="timerModal" style="display:none;position:fixed;bottom:0;left:0;width:100%;background:rgba(20,20,20,.95);padding:20px;border-radius:20px 20px 0 0;z-index:10;color:white">
<div><b>Fade-out timer</b></div>
<div style="margin-top:10px">
<button onclick="startTimer(15)">15m</button>
<button onclick="startTimer(30)">30m</button>
<button onclick="startTimer(45)">45m</button>
<button onclick="startTimer(60)">60m</button>
</div>
<div style="margin-top:10px">
Hours <input id="th" type="number" min="0" value="0" style="width:50px">
Minutes <input id="tm" type="number" min="0" value="30" style="width:50px">
<button onclick="startCustomTimer()">Start</button>
<button onclick="closeTimer()">Close</button>
</div>
</div>

<audio id="audio"></audio>


<script>

const tracks=[

{
title:"Sweet Jane",
file:"sweetjane.mp3",
enabled:true
},

{
title:"Ocean",
file:"ocean.mp3",
enabled:true
},

{
title:"Morricone",
file:"morricone.mp3",
enabled:true
}

];


let currentTrack=0;

let repeatMode=0;

let shuffle=false;


const audio=
document.getElementById("audio");

const title=
document.getElementById("title");

const playBtn=
document.getElementById("play");

const progress=
document.getElementById("progress");

const current=
document.getElementById("current");

const duration=
document.getElementById("duration");

const repeatBtn=
document.getElementById("repeat");

const shuffleBtn=
document.getElementById("shuffle");



function getEnabledTracks(){

return tracks
.map((t,i)=>t.enabled?i:null)
.filter(i=>i!==null);

}


function loadTrack(i){

currentTrack=i;

audio.src=
tracks[i].file;

title.innerText=
tracks[i].title;

audio.load();

renderPlaylist();

}


function playTrack(i){

loadTrack(i);

audio.play();

playBtn.innerText="⏸";

}


function renderPlaylist(){

let html="";

tracks.forEach((t,i)=>{

html+=`

<div class="
song
${i===currentTrack?"activeSong":""}
">

<span
class="check"
onclick="toggleTrack(${i})">

${t.enabled?"☑":"☐"}

</span>

<span
class="songTitle"
onclick="playTrack(${i})">

${i+1}. ${t.title}

</span>

</div>

`;

});

playlist.innerHTML=
html;

}


function toggleTrack(i){

tracks[i].enabled=
!tracks[i].enabled;

renderPlaylist();

}



loadTrack(0);



playBtn.onclick=()=>{

if(audio.paused){

audio.play();

playBtn.innerText="⏸";

}
else{

audio.pause();

playBtn.innerText="▶";

}

};



repeatBtn.onclick=()=>{

repeatMode++;

if(repeatMode>2)
repeatMode=0;

repeatBtn.innerText=
["↩","🔁","🔂"]
[repeatMode];

};



shuffleBtn.onclick=()=>{

shuffle=!shuffle;

shuffleBtn.classList.toggle(
"activeButton"
);

};



function nextTrack(){

let enabled=
getEnabledTracks();

if(enabled.length===0)
return;

if(repeatMode===2){

audio.currentTime=0;
audio.play();

return;

}

if(shuffle){

currentTrack=

enabled[
Math.floor(
Math.random()
*
enabled.length
)];

}
else{

let pos=
enabled.indexOf(
currentTrack
);

pos++;

if(pos>=enabled.length){

if(repeatMode===1){

pos=0;

}
else{

audio.pause();

playBtn.innerText="▶";

return;

}

}

currentTrack=
enabled[pos];

}

playTrack(currentTrack);

}



document
.getElementById("next")
.onclick=nextTrack;



document
.getElementById("prev")
.onclick=()=>{

let enabled=
getEnabledTracks();

let pos=
enabled.indexOf(
currentTrack
);

pos--;

if(pos<0)
pos=
enabled.length-1;

playTrack(
enabled[pos]
);

};


audio.addEventListener(
"ended",
nextTrack
);


audio.addEventListener(
"timeupdate",
()=>{

progress.value=
(audio.currentTime/audio.duration)
*100||0;

current.innerText=
format(
audio.currentTime
);

duration.innerText=
format(
audio.duration
);

});


progress.oninput=()=>{

audio.currentTime=
(progress.value/100)
*
audio.duration;

};


function format(sec){

if(!sec)
return "0:00";

let m=
Math.floor(sec/60);

let s=
Math.floor(sec%60);

if(s<10)
s="0"+s;

return m+":"+s;

}



// BACKGROUND
// BACKGROUND

const c =
document.getElementById("bg");

const ctx =
c.getContext("2d");

let tiles = [];
let pulses = [];

function resize(){

    c.width =
    window.innerWidth;

    c.height =
    window.innerHeight;

    generateTiles();
}

window.addEventListener(
    "resize",
    resize
);

class Tile{

    constructor(x,y,size){

        this.x=x;
        this.y=y;
        this.size=size;

        this.phase=
            Math.random()*1000;

        this.baseColor=
            [
                [110,115,125],
                [125,130,140],
                [145,150,160],
                [170,180,190],
                [190,205,220]
            ][
                Math.floor(
                    Math.random()*5
                )
            ];

        this.vertices=[];

        const sides=
            4+
            Math.floor(
                Math.random()*3
            );

        for(
            let i=0;
            i<sides;
            i++
        ){

            const a=
                (i/sides)*
                Math.PI*2;

            const r=
                size*
                (
                    0.7+
                    Math.random()*0.5
                );

            this.vertices.push({
                x:Math.cos(a)*r,
                y:Math.sin(a)*r
            });

        }

    }

    draw(time){

        let glow =
            0.5 +
            0.5 *
            Math.sin(
                time*0.00015 +
                this.phase
            );

        for(let p of pulses){

            const d =
                Math.hypot(
                    this.x-p.x,
                    this.y-p.y
                );

            glow +=
                Math.exp(
                    -Math.pow(
                        (d-p.radius)/100,
                        2
                    )
                ) * 0.6;

        }

        const factor =
            Math.min(
                1.6,
                0.7+glow
            );

        const r=
            Math.min(
                255,
                this.baseColor[0]
                *factor
            );

        const g=
            Math.min(
                255,
                this.baseColor[1]
                *factor
            );

        const b=
            Math.min(
                255,
                this.baseColor[2]
                *factor
            );

        ctx.beginPath();

        ctx.moveTo(
            this.x+this.vertices[0].x,
            this.y+this.vertices[0].y
        );

        for(let v of this.vertices){

            ctx.lineTo(
                this.x+v.x,
                this.y+v.y
            );

        }

        ctx.closePath();

        ctx.fillStyle =
            `rgba(${r},${g},${b},0.32)`;

        ctx.fill();

        ctx.strokeStyle =
            "rgba(255,255,255,0.05)";

        ctx.lineWidth=1;

        ctx.stroke();

        if(glow>0.9){

            ctx.shadowBlur=18;

            ctx.shadowColor=
                "rgba(220,235,255,0.25)";

            ctx.fill();

            ctx.shadowBlur=0;
        }

    }

}

function generateTiles(){

    tiles=[];

    const spacing=42;

    for(
        let y=-40;
        y<c.height+40;
        y+=spacing
    ){

        for(
            let x=-40;
            x<c.width+40;
            x+=spacing
        ){

            tiles.push(

                new Tile(

                    x+
                    (Math.random()-0.5)*12,

                    y+
                    (Math.random()-0.5)*12,

                    16+
                    Math.random()*10

                )

            );

        }

    }

}

function createPulse(){

    pulses.push({

        x:
        Math.random()*c.width,

        y:
        Math.random()*c.height,

        radius:0

    });

}

setInterval(
    createPulse,
    5000
);

function animate(){

    const grad =
        ctx.createLinearGradient(
            0,
            0,
            0,
            c.height
        );

    grad.addColorStop(
        0,
        "rgb(18,20,24)"
    );

    grad.addColorStop(
        1,
        "rgb(30,34,42)"
    );

    ctx.fillStyle =
        grad;

    ctx.fillRect(
        0,
        0,
        c.width,
        c.height
    );

    const now =
        performance.now();

    for(let p of pulses){

        p.radius += 0.4;

    }

    pulses =
        pulses.filter(
            p => p.radius < 1000
        );

    for(let tile of tiles){

        tile.draw(now);

    }

    requestAnimationFrame(
        animate
    );

}

resize();
animate();// TIMER
let timerSeconds=0;
let timerInterval=null;
const timerBtn=document.getElementById("timerBtn");
const timerDisplay=document.getElementById("timerDisplay");
const timerModal=document.getElementById("timerModal");

timerBtn.onclick=()=>{timerModal.style.display="block";}

function closeTimer(){timerModal.style.display="none";}

function startCustomTimer(){
let h=parseInt(document.getElementById("th").value)||0;
let m=parseInt(document.getElementById("tm").value)||0;
startTimer(h*60+m);
}

function startTimer(minutes){
closeTimer();
timerSeconds=minutes*60;
localStorage.setItem("sleepTimerEnd",Date.now()+timerSeconds*1000);

if(timerInterval) clearInterval(timerInterval);

timerInterval=setInterval(updateTimer,1000);
updateTimer();
}

function updateTimer(){
let end=localStorage.getItem("sleepTimerEnd");
if(!end)return;

timerSeconds=Math.floor((end-Date.now())/1000);

if(timerSeconds<=0){
clearInterval(timerInterval);
audio.pause();
audio.volume=1;
timerDisplay.innerText="";
localStorage.removeItem("sleepTimerEnd");
title.innerText="Listening session ended";
return;
}

if(timerSeconds<=15){
audio.volume=Math.max(0,timerSeconds/15);
}

let h=Math.floor(timerSeconds/3600);
let m=Math.floor((timerSeconds%3600)/60);

timerDisplay.innerText=
"⏱ "+(h>0?h+"h ":"")+m+"m";
}

window.addEventListener("load",()=>{
let end=localStorage.getItem("sleepTimerEnd");
if(end){
timerInterval=setInterval(updateTimer,1000);
updateTimer();
}
});


</script>

</body>
</html>
